<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1211"/>
      <stop offset="100%" stop-color="#141c1a"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f8a70" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#1f8a70" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="950" cy="320" r="360" fill="url(#greenGlow)"/>

  <!-- subtle grid -->
  <g stroke="#1f8a70" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 120 H1200 M0 240 H1200 M0 360 H1200 M0 480 H1200"/>
    <path d="M120 0 V630 M240 0 V630 M360 0 V630 M480 0 V630"/>
  </g>

  <!-- graph decoration on the right -->
  <g transform="translate(820, 315)">
    <!-- edges -->
    <g stroke="#1f8a70" stroke-opacity="0.55" stroke-width="1.4" fill="none">
      <line x1="0"   y1="0"    x2="120" y2="-90"/>
      <line x1="0"   y1="0"    x2="-80" y2="-130"/>
      <line x1="0"   y1="0"    x2="90"  y2="110"/>
      <line x1="0"   y1="0"    x2="-110" y2="60"/>
      <line x1="0"   y1="0"    x2="160" y2="-20"/>
      <line x1="120" y1="-90"  x2="160" y2="-20"/>
      <line x1="-80" y1="-130" x2="-110" y2="60"/>
      <line x1="90"  y1="110"  x2="160" y2="-20"/>
      <line x1="120" y1="-90"  x2="-80" y2="-130"/>
      <line x1="-110" y1="60"  x2="90"  y2="110"/>
    </g>
    <g stroke="#c4492d" stroke-opacity="0.42" stroke-width="1.2" stroke-dasharray="4 4" fill="none">
      <line x1="120" y1="-90" x2="220" y2="-160"/>
      <line x1="-80" y1="-130" x2="-170" y2="-200"/>
      <line x1="90" y1="110" x2="200" y2="190"/>
    </g>

    <!-- nodes -->
    <g>
      <circle cx="0"    cy="0"    r="14" fill="#1f8a70"/>
      <circle cx="120"  cy="-90"  r="9"  fill="#c4a23f"/>
      <circle cx="-80"  cy="-130" r="9"  fill="#6f9bd8"/>
      <circle cx="90"   cy="110"  r="8"  fill="#e0653f"/>
      <circle cx="-110" cy="60"   r="8"  fill="#8e6cb3"/>
      <circle cx="160"  cy="-20"  r="8"  fill="#4fa88f"/>
      <circle cx="220"  cy="-160" r="6"  fill="#b5728a"/>
      <circle cx="-170" cy="-200" r="6"  fill="#5da0a3"/>
      <circle cx="200"  cy="190"  r="6"  fill="#d48a5a"/>
      <circle cx="0"    cy="0"    r="18" fill="none" stroke="#1f8a70" stroke-opacity="0.55"/>
    </g>
  </g>

  <!-- kicker -->
  <g font-family="Inter, -apple-system, Segoe UI, sans-serif" fill="#1f8a70" font-weight="850" letter-spacing="4">
    <text x="64" y="140" font-size="22">OPEN-SOURCE MCP SERVER · MULTI-REPO AI CONTEXT</text>
  </g>

  <!-- title -->
  <g font-family="Inter, -apple-system, Segoe UI, sans-serif" fill="#fffaf0" font-weight="900">
    <text x="64" y="250" font-size="88" letter-spacing="-1">Global Project</text>
    <text x="64" y="348" font-size="88" letter-spacing="-1">Context</text>
  </g>

  <!-- subtitle -->
  <g font-family="Inter, -apple-system, Segoe UI, sans-serif" fill="#fffaf0" fill-opacity="0.78" font-weight="500">
    <text x="64" y="428" font-size="28">Share indexed context across Git repositories</text>
    <text x="64" y="468" font-size="28">for Codex, Claude, Copilot &amp; Gemini — locally.</text>
  </g>

  <!-- bottom strip -->
  <g font-family="SFMono-Regular, Consolas, monospace" fill="#fffaf0" fill-opacity="0.72" font-size="20">
    <rect x="64" y="540" width="12" height="12" fill="#1f8a70"/>
    <text x="92" y="551">github.com/rmarquesa/Global-Project-Context</text>
    <text x="64" y="585" fill-opacity="0.48">627 nodes · 1250 edges · 49 communities — graphified from this repo</text>
  </g>
</svg>
